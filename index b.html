<!DOCTYPE html>


<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EasyShare \u2014 Group Trip Expense Splitter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0F1117;
    --surface:  #181C27;
    --card:     #1E2335;
    --border:   #2A3050;
    --accent:   #E8875A;
    --accent2:  #5A9FE8;
    --text:     #EEF0F8;
    --muted:    #7A82A0;
    --pos:      #5AC8A0;
    --neg:      #E87070;
    --hi:       #2A3050;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* \u2500\u2500 HEADER \u2500\u2500 */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  #header .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  #header .logo span { color: var(--accent); }
  #header .meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* \u2500\u2500 TABS \u2500\u2500 */
  #tabs {
    display: flex;
    gap: 4px;
    padding: 14px 14px 0;
    position: sticky;
    top: 69px;
    z-index: 190;
    background: var(--bg);
  }
  .tab-btn {
    flex: 1;
    padding: 9px 4px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* \u2500\u2500 CONTENT \u2500\u2500 */
  #content {
    max-width: 640px;
    margin: 0 auto;
    padding: 18px 14px;
  }

  /* \u2500\u2500 CARDS \u2500\u2500 */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .card-sm {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
  }

  /* \u2500\u2500 SECTION TITLE \u2500\u2500 */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* \u2500\u2500 INPUTS \u2500\u2500 */
  input, select {
    background: var(--hi);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  select option { background: var(--card); }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }

  /* \u2500\u2500 BUTTONS \u2500\u2500 */
  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--accent);
    color: #fff;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-danger {
    background: rgba(232,112,112,0.18);
    color: var(--neg);
    border: none;
    padding: 5px 10px;
    font-size: 13px;
  }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* \u2500\u2500 FLEX UTILS \u2500\u2500 */
  .row { display: flex; align-items: center; gap: 10px; }
  .row-sb { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* \u2500\u2500 AVATAR \u2500\u2500 */
  .avatar {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px var(--card);
    font-family: 'DM Sans', sans-serif;
  }

  /* \u2500\u2500 TAGS \u2500\u2500 */
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
    display: inline-block;
  }

  /* \u2500\u2500 BALANCE PILL \u2500\u2500 */
  .pill {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
    white-space: nowrap;
    display: inline-block;
  }

  /* \u2500\u2500 PROGRESS BAR \u2500\u2500 */
  .progress-track {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* \u2500\u2500 MODAL \u2500\u2500 */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    backdrop-filter: blur(5px);
  }
  #modal-overlay.open { display: flex; }
  #modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px;
    max-width: 560px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.65);
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 20px;
  }

  /* \u2500\u2500 CHIPS (split / category) \u2500\u2500 */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px;
    border-radius: 99px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    background: var(--hi);
    color: var(--muted);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* \u2500\u2500 EMPTY STATE \u2500\u2500 */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* \u2500\u2500 PERSON SELECTOR SCROLL \u2500\u2500 */
  .person-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .person-scroll::-webkit-scrollbar { display: none; }
  .person-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .person-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* \u2500\u2500 STAT CARD (person view) \u2500\u2500 */
  .stat-mini {
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-mini .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .stat-mini .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
  }

  /* \u2500\u2500 NOTICE BOX \u2500\u2500 */
  .notice {
    margin-top: 12px;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
  }

  /* \u2500\u2500 DIVIDER \u2500\u2500 */
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  /* \u2500\u2500 MONEY \u2500\u2500 */
  .money { font-family: 'Syne', sans-serif; font-weight: 800; }

  @media (max-width: 400px) {
    .grid3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="logo">\u2726 <span>Easy</span>Share</div>
    <div class="meta" id="header-meta">0 members \u00b7 0 expenses</div>
  </div>
  <div style="font-size:22px">\ud83c\udf0f</div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" data-tab="members">\ud83d\udc65 Members</button>
  <button class="tab-btn"        data-tab="expenses">\ud83e\uddfe Expenses</button>
  <button class="tab-btn"        data-tab="summary">\ud83d\udcca Summary</button>
  <button class="tab-btn"        data-tab="settle">\ud83d\udcb8 Settle</button>
</div>

<!-- MAIN CONTENT -->
<div id="content"></div>

<!-- EXPENSE MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-title" id="modal-title">New Expense</div>

    <div style="margin-bottom:14px">
      <label>Description</label>
      <input id="f-desc" placeholder="e.g. Dinner at Tim Ho Wan" />
    </div>

    <div class="grid2" style="margin-bottom:14px">
      <div>
        <label>Amount</label>
        <input id="f-amount" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div>
        <label>Currency</label>
        <select id="f-currency"></select>
      </div>
    </div>

    <div id="per-person-hint" style="font-size:12px;color:var(--accent);margin-bottom:12px;min-height:18px"></div>

    <div style="margin-bottom:14px">
      <label>Category</label>
      <div class="chip-row" id="f-cats"></div>
    </div>

    <div style="margin-bottom:14px">
      <label>Paid by</label>
      <select id="f-payer"></select>
    </div>

    <div style="margin-bottom:20px">
      <label id="split-label">Split between (0 selected)</label>
      <div class="chip-row" id="f-splits"></div>
    </div>

    <div class="row">
      <button class="btn btn-ghost" id="modal-cancel" style="flex:1">Cancel</button>
      <button class="btn" id="modal-save" style="flex:2">Add Expense</button>
    </div>
  </div>
</div>

<script>
// \u2500\u2500\u2500 DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const CURRENCIES = ["HKD","USD","EUR","GBP","JPY","CNY","SGD","TWD","KRW","AUD"];
const RATES = { HKD:1, USD:7.78, EUR:8.50, GBP:9.90, JPY:0.052, CNY:1.07, SGD:5.75, TWD:0.24, KRW:0.0057, AUD:4.95 };
const CATS = [
  { id:"food",      label:"\ud83c\udf5c Food",      color:"#E8875A" },
  { id:"transport", label:"\ud83d\ude8c Transport", color:"#5A9FE8" },
  { id:"hotel",     label:"\ud83c\udfe8 Hotel",     color:"#9B7FD4" },
  { id:"activity",  label:"\ud83c\udfa1 Activity",  color:"#5AC8A0" },
  { id:"shopping",  label:"\ud83d\udecd Shopping",  color:"#E8C05A" },
  { id:"other",     label:"\ud83d\udccc Other",     color:"#A0A0A0" },
];
const AV_COLORS = ["#E8875A","#5A9FE8","#9B7FD4","#5AC8A0","#E8C05A","#E87070","#5AD4D4","#D45A9B"];

let state = {
  members: [],
  expenses: [],
  currentTab: "members",
  selectedPerson: null,    // null = group view
  editingExpId: null,
  formSplits: [],
  formCat: "food",
};

// \u2500\u2500\u2500 HELPERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const toHKD  = (a, c) => a * (RATES[c] || 1);
const fmt    = n  => `HKD ${Math.abs(n).toFixed(2)}`;
const fmtS   = n  => (n >= 0 ? `+${fmt(n)}` : `-${fmt(n)}`);
const catOf  = id => CATS.find(c => c.id === id) || CATS[5];
const avColor = name => AV_COLORS[name.charCodeAt(0) % AV_COLORS.length];
const esc    = s  => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const dateStr = iso => new Date(iso).toLocaleDateString("en-HK",{month:"short",day:"numeric"});

function avatarHTML(name, size=36) {
  const bg = avColor(name);
  const fs = Math.round(size * 0.38);
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px;">${esc(name.charAt(0).toUpperCase())}</div>`;
}

function tagHTML(catId) {
  const c = catOf(catId);
  return `<span class="tag" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}44">${c.label}</span>`;
}

function pillHTML(val) {
  const pos = val >= 0;
  const col = pos ? "var(--pos)" : "var(--neg)";
  const bg  = pos ? "rgba(90,200,160,0.12)" : "rgba(232,112,112,0.12)";
  const brd = pos ? "rgba(90,200,160,0.25)" : "rgba(232,112,112,0.25)";
  return `<span class="pill" style="background:${bg};color:${col};border:1px solid ${brd}">${fmtS(val)}</span>`;
}

function progressHTML(value, max, color) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  return `<div class="progress-track"><div class="progress-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>`;
}

// \u2500\u2500\u2500 CALCULATIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function calcBalances() {
  const b = {};
  state.members.forEach(m => b[m] = 0);
  state.expenses.forEach(e => {
    const share = e.amount / e.splits.length;
    e.splits.forEach(s => { if (b[s] !== undefined) b[s] -= share; });
    if (b[e.payer] !== undefined) b[e.payer] += e.amount;
  });
  return b;
}

function calcSettlements(balances) {
  const pos = [], neg = [];
  Object.entries(balances).forEach(([name, val]) => {
    if (val >  0.005) pos.push({ name, val });
    if (val < -0.005) neg.push({ name, val: -val });
  });
  pos.sort((a,b) => b.val - a.val);
  neg.sort((a,b) => b.val - a.val);
  const txns = [];
  let i=0, j=0;
  while (i < pos.length && j < neg.length) {
    const amt = Math.min(pos[i].val, neg[j].val);
    txns.push({ from: neg[j].name, to: pos[i].name, amount: amt });
    pos[i].val -= amt; neg[j].val -= amt;
    if (pos[i].val < 0.005) i++;
    if (neg[j].val < 0.005) j++;
  }
  return txns;
}

function personStats(name) {
  const balances = calcBalances();
  const myExp  = state.expenses.filter(e => e.splits.includes(name));
  const paid   = state.expenses.filter(e => e.payer === name).reduce((s,e) => s + e.amount, 0);
  const owed   = myExp.reduce((s,e) => s + e.amount / e.splits.length, 0);
  const balance = balances[name] || 0;
  const catTotals = {};
  CATS.forEach(c => catTotals[c.id] = 0);
  myExp.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount / e.splits.length; });
  const paidList = state.expenses.filter(e => e.payer === name);
  return { paid, owed, balance, catTotals, myExp, paidList };
}

function totalGroupSpend() {
  return state.expenses.reduce((s,e) => s + e.amount, 0);
}

// \u2500\u2500\u2500 RENDER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function render() {
  updateHeader();
  renderTab();
}

function updateHeader() {
  const total = totalGroupSpend();
  document.getElementById("header-meta").textContent =
    `${state.members.length} member${state.members.length!==1?"s":""} \u00b7 ` +
    `${state.expenses.length} expense${state.expenses.length!==1?"s":""}` +
    (total > 0 ? ` \u00b7 HKD ${total.toFixed(0)} total` : "");
}

function renderTab() {
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === state.currentTab);
  });
  const c = document.getElementById("content");
  if      (state.currentTab === "members")  c.innerHTML = renderMembers();
  else if (state.currentTab === "expenses") c.innerHTML = renderExpenses();
  else if (state.currentTab === "summary")  c.innerHTML = renderSummary();
  else if (state.currentTab === "settle")   c.innerHTML = renderSettle();
  bindTabEvents();
}

// \u2500\u2500 MEMBERS TAB \u2500\u2500
function renderMembers() {
  const balances = calcBalances();
  const rows = state.members.map(name => {
    const b = balances[name] || 0;
    const stats = personStats(name);
    return `
      <div class="card" style="cursor:pointer" data-goto-person="${esc(name)}">
        <div class="row-sb">
          <div class="row" style="gap:12px">
            ${avatarHTML(name, 38)}
            <div>
              <div style="font-weight:600">${esc(name)}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">
                Paid ${fmt(stats.paid)} &middot; Owed ${fmt(stats.owed)}
              </div>
            </div>
          </div>
          <div class="row" style="gap:8px">
            ${pillHTML(b)}
            <button class="btn btn-danger btn-sm" data-remove-member="${esc(name)}">\u2715</button>
          </div>
        </div>
      </div>`;
  }).join("");

  return `
    <p class="section-title">Add Members</p>
    <div class="row" style="margin-bottom:20px">
      <input id="member-input" placeholder="Enter name\u2026" style="flex:1" />
      <button class="btn" id="btn-add-member">Add</button>
    </div>
    ${state.members.length === 0
      ? `<div class="card empty"><div class="empty-icon">\ud83d\udc65</div><div>Add your travel companions above</div></div>`
      : rows
    }`;
}

// \u2500\u2500 EXPENSES TAB \u2500\u2500
function renderExpenses() {
  const rows = state.expenses.map(e => {
    return `
      <div class="card">
        <div class="row-sb" style="align-items:flex-start">
          <div style="flex:1">
            <div class="row" style="gap:6px;margin-bottom:6px;flex-wrap:wrap">
              ${tagHTML(e.category)}
              <span style="font-size:12px;color:var(--muted)">${dateStr(e.date)}</span>
            </div>
            <div style="font-weight:600;font-size:15px">${esc(e.desc)}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px">
